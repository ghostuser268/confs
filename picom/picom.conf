#################################
#             Shadows           #
#################################
shadow = true;
shadow-radius = 20;
shadow-opacity = .9;
shadow-offset-x = -18;
shadow-offset-y = -18;
shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'Conky'",
  "class_g ?= 'Notify-osd'",
  "class_g = 'Cairo-clock'",
  "_GTK_FRAME_EXTENTS@:c",
  #"class_g = 'dwm'",

];
#################################
#           Fading              #
#################################
fading = false
fade-in-step = 0.03;
fade-out-step = 0.03;
#################################
#   Transparency / Opacity      #
#################################
inactive-opacity = 1.2;
active-opacity = 1.2
frame-opacity = 1;
inactive-opacity-override = false;
focus-exclude = [ "class_g = 'Cairo-clock'" ];
opacity-rule = [
	"100:class_g = 'firefox'",
	"100:class_g ?= 'dock'",
	"100:class_g = 'MongoDB Compass'",
	"100:class_g ?= 'chromium'",
	"100:class_g ?= 'figma-linux'",

]
#################################
#           Corners             #
#################################
corner-radius = 8
rounded-corners-exclude = [
  "class_g = 'dwm'",
  "window_type = 'dock'",
  "window_type = 'desktop'"
];
#################################
#     Background-Blurring       #
#################################
 #blur-method = "kernal"
 blur-method = "dual_kawase"
 blur-size = 0
 blur-strength = 8
 blur-background = false
 blur-kern = "3x3box";
 blur-background-exclude = [
  #"window_type = 'dock'",
  "window_type = 'desktop'",
  "_GTK_FRAME_EXTENTS@:c"
];
#################################
#       General Settings        #
#################################
backend = "glx";
vsync = true;
mark-wmwin-focused = false
mark-ovredir-focused = false
detect-rounded-corners = false;
detect-client-opacity = true;
refresh-rate = 0;
detect-transient = true;
use-damage = true;
log-level = "warn";

wintypes:
{
  tooltip = { fade = true; shadow = true; opacity = 0.75; focus = true; full-shadow = false; };
  dock = { shadow = false; clip-shadow-above = false; opacity = 0.1 } #true true .8
  dnd = { shadow = false; }
  popup_menu = { opacity = 1; }
  dropdown_menu = { opacity = 1; }
}; 
